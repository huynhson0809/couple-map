<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fff8fa" />

    <!-- SEO -->
    <title>Pinly – Bản đồ kỷ niệm dành cho các cặp đôi</title>
    <meta name="description" content="Pinly giúp các cặp đôi lưu giữ kỷ niệm trên bản đồ. Ghim địa điểm, chia sẻ ảnh, theo dõi streak và tạo timeline tình yêu của riêng bạn." />
    <link rel="canonical" href="https://pinly-app.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pinly-app.vercel.app/" />
    <meta property="og:title" content="Pinly – Bản đồ kỷ niệm dành cho các cặp đôi" />
    <meta property="og:description" content="Ghim kỷ niệm, chia sẻ ảnh, streak hẹn hò – tất cả trên một bản đồ dành riêng cho 2 bạn." />
    <meta property="og:image" content="https://pinly-app.vercel.app/icons/icon-512.png" />
    <meta property="og:locale" content="vi_VN" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:site_name" content="Pinly" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pinly – Bản đồ kỷ niệm dành cho các cặp đôi" />
    <meta name="twitter:description" content="Ghim kỷ niệm, chia sẻ ảnh, streak hẹn hò – tất cả trên một bản đồ dành riêng cho 2 bạn." />
    <meta name="twitter:image" content="https://pinly-app.vercel.app/icons/icon-512.png" />

    <!-- PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Pinly" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <script>
      (function () {
        var theme = "light";
        var lightThemeColor = "#fff8fa";
        var darkThemeColor = "#0f1015";

        try {
          var storedTheme = localStorage.getItem("pinly.theme");
          if (storedTheme === "dark" || storedTheme === "light") {
            theme = storedTheme;
          }
        } catch (_error) {
          theme = "light";
        }

        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;

        var themeColor = document.querySelector('meta[name="theme-color"]');
        if (themeColor) {
          themeColor.setAttribute(
            "content",
            theme === "dark" ? darkThemeColor : lightThemeColor,
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
